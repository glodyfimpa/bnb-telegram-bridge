name: Get Telegram Updates

on:
  workflow_dispatch:
    inputs:
      since_hours:
        description: 'Filtra messaggi delle ultime N ore (default 24)'
        required: false
        type: string
        default: '24'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch updates from Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SINCE_HOURS: ${{ inputs.since_hours }}
        run: |
          RESPONSE=$(curl -s "https://api.telegram.org/bot${BOT_TOKEN}/getUpdates")
          OK=$(echo "$RESPONSE" | jq -r '.ok')
          if [ "$OK" != "true" ]; then
            echo "::error::Telegram API returned error: $RESPONSE"
            exit 1
          fi
          CUTOFF=$(date -u -d "$SINCE_HOURS hours ago" +%s)
          FILTERED=$(echo "$RESPONSE" | jq --arg cutoff "$CUTOFF" --arg chat_id "$CHAT_ID" '
            .result
            | map(select(.message != null))
            | map(select((.message.chat.id | tostring) == $chat_id))
            | map(select(.message.date >= ($cutoff | tonumber)))
            | map({date: .message.date, text: .message.text, message_id: .message.message_id})
          ')
          COUNT=$(echo "$FILTERED" | jq 'length')
          echo "::notice::Found $COUNT messages in the last $SINCE_HOURS hours"

          mkdir -p state
          FETCHED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          jq -n \
            --arg fetched_at "$FETCHED_AT" \
            --arg since_hours "$SINCE_HOURS" \
            --arg run_id "${GITHUB_RUN_ID}" \
            --argjson count "$COUNT" \
            --argjson messages "$FILTERED" \
            '{fetched_at: $fetched_at, since_hours: $since_hours, run_id: $run_id, count: $count, messages: $messages}' \
            > state/latest-messages.json

          echo "=== MESSAGES_START ==="
          cat state/latest-messages.json
          echo "=== MESSAGES_END ==="

      - name: Commit state/latest-messages.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/latest-messages.json
          if git diff --staged --quiet; then
            echo "::notice::No changes in state/latest-messages.json, skipping commit"
          else
            git commit -m "chore(state): update latest-messages.json (run ${GITHUB_RUN_ID})"
            git push
          fi
